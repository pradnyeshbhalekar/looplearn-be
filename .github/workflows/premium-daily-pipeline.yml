name: Daily Premium Pipeline


on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Premium Pipeline
        run: |
          curl -X POST "${{secrets.PREMIUM_PIPELINE_URL}}" \
          -H "Authorization: Bearer ${{secrets.PIPELINE_TOKEN}}"
          -H "Content-Type: application/json"
